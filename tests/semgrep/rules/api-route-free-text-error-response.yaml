rules:
  - id: api-route-free-text-error-response
    message: >-
      公开 API route 避免返回自由文本 error/message；优先用
      createApiErrorResponse()/createApiSuccessResponse() 或统一 errorCode contract。
    languages: [typescript, javascript]
    severity: WARNING
    pattern-either:
      - pattern: |
          NextResponse.json({ ..., error: $VAL, ... }, ...)
      - pattern: |
          NextResponse.json({ ..., message: $VAL, ... }, ...)
    paths:
      include:
        - "**/src/app/api/**/*.ts"
        - "**/src/app/api/**/*.tsx"
        - "**/api-route-free-text-error-response.ts"
      exclude:
        - "**/__tests__/**"
        - "**/*.test.*"
        - "**/*.spec.*"
        - "**/src/app/api/csp-report/**"
    metadata:
      category: correctness
      technology: [nextjs]
