rules:
  - id: critical-lead-route-missing-idempotency
    message: >-
      关键公开写路径必须显式使用 withIdempotency(..., { required: true })。
    languages: [generic]
    severity: WARNING
    patterns:
      # File-level contract check from Semgrep's documented absence-matching pattern:
      # scan the whole file, then suppress findings if the required idempotency
      # wrapper signature appears anywhere in the route implementation.
      - pattern-regex: '(?s).+'
      - pattern-not-regex: '(?s).*withIdempotency\s*\([\s\S]*required\s*:\s*true'
    paths:
      include:
        - "**/src/app/api/inquiry/route.ts"
        - "**/src/app/api/subscribe/route.ts"
    metadata:
      category: correctness
      technology: [nextjs]
