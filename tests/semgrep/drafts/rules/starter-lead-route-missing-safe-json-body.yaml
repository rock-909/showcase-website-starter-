rules:
  - id: starter-lead-route-missing-safe-json-body
    message: >-
      starter 公开 lead route 必须显式使用 safeParseJson()，保留 JSON body size gate 和统一错误码。
    languages: [generic]
    severity: WARNING
    patterns:
      # File-level contract check from Semgrep's documented absence-matching pattern.
      # Scan the whole route file, then suppress findings when the safe JSON
      # parser appears anywhere in the implementation.
      - pattern-regex: '(?s).+'
      - pattern-not-regex: '(?s).*safeParseJson\s*<'
    paths:
      include:
        - "**/src/app/api/contact/route.ts"
        - "**/src/app/api/inquiry/route.ts"
        - "**/src/app/api/subscribe/route.ts"
    metadata:
      category: correctness
      technology: [nextjs]
