name: Uplink Health Check

on:
  workflow_dispatch:

jobs:
  check:
    name: Third-Party Service Health
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Check site health endpoint
        run: |
          if [ -z "${{ vars.SITE_URL }}" ]; then
            echo "::error::SITE_URL is required for manual uplink health checks"
            exit 1
          fi
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 10 \
            "${{ vars.SITE_URL }}/api/health")
          echo "Site health: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::error::Site health endpoint returned $STATUS"
            exit 1
          fi

      - name: Check Airtable API
        if: env.AIRTABLE_API_KEY != ''
        env:
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 10 \
            -H "Authorization: Bearer $AIRTABLE_API_KEY" \
            "https://api.airtable.com/v0/meta/whoami")
          echo "Airtable: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::warning::Airtable API returned $STATUS"
          fi

      - name: Check Resend API
        if: env.RESEND_API_KEY != ''
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 10 \
            -H "Authorization: Bearer $RESEND_API_KEY" \
            "https://api.resend.com/domains")
          echo "Resend: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::warning::Resend API returned $STATUS"
          fi

      - name: Check Turnstile endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 10 \
            -X POST \
            "https://challenges.cloudflare.com/turnstile/v0/siteverify" \
            -d "secret=test&response=test")
          echo "Turnstile: $STATUS"
          # Turnstile returns 200 even for invalid tokens (just success:false)
          if [ "$STATUS" != "200" ]; then
            echo "::warning::Turnstile endpoint returned $STATUS"
          fi
